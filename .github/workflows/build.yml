name: Build Mihomo Run

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Install Resource Tools
        run: go install github.com/akavel/rsrc@latest

      - name: Build with Hardened Manifest
        run: |
          if (Test-Path "go.mod") { rm go.mod }
          go mod init mihomo-run
          go get golang.org/x/sys/windows
          go mod tidy
          
          $manifest = @"
          <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <assembly xmlns="urn:schemas-microsoft-com:asm.v1" manifestVersion="1.0">
            <assemblyIdentity version="1.0.0.0" processorArchitecture="*" name="mihomo-run" type="win32"/>
            <trustInfo xmlns="urn:schemas-microsoft-com:asm.v3">
              <security>
                <requestedPrivileges>
                  <requestedExecutionLevel level="requireAdministrator" uiAccess="false"/>
                </requestedPrivileges>
              </security>
            </trustInfo>
          </assembly>
          "@
          $manifest | Out-File -FilePath "app.manifest" -Encoding utf8

          $(go env GOPATH)/bin/rsrc -manifest app.manifest -o rsrc.syso

          # 3. 编译：-H windowsgui 确保无控制台，嵌入资源确保 UAC 弹出
          $env:GOOS="windows"
          $env:GOARCH="amd64"
          go build -ldflags="-H windowsgui -s -w" -o mihomo-run.exe main.go

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-run-binary
          path: mihomo-run.exe
          retention-days: 7
