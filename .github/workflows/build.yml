name: Build Mihomo Run

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          if (Test-Path "go.mod") { rm go.mod }
          go mod init mihomo-run
          go get golang.org/x/sys/windows
          go mod tidy
          
          $manifest = @"
          <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <assembly xmlns="urn:schemas-microsoft-com:asm.v1" manifestVersion="1.0">
            <trustInfo xmlns="urn:schemas-microsoft-com:asm.v3">
              <security>
                <requestedPrivileges>
                  <requestedExecutionLevel level="requireAdministrator" uiAccess="false"/>
                </requestedPrivileges>
              </security>
            </trustInfo>
          </assembly>
          "@
          $manifest | Out-File -FilePath "mihomo-run.exe.manifest" -Encoding utf8

          $env:GOOS="windows"
          go build -ldflags="-H windowsgui -s -w" -o mihomo-run.exe main.go

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-run-binary
          path: mihomo-run.exe
