name: Build mihomo-run

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Install dependencies
        shell: pwsh
        run: |
          go mod tidy

      - name: Install and Run rsrc (Resource Compiler)
        shell: pwsh
        run: |
          go install github.com/akavel/rsrc@latest
          $GOBIN = "$(go env GOPATH)\bin"
          
          if (Test-Path "ui/icons/app.ico") {
            & "$GOBIN\rsrc.exe" -manifest main.manifest -ico ui/icons/app.ico -o rsrc.syso
          } else {
            Write-Error "Icon file not found at ui/icons/app.ico"
            exit 1
          }

      - name: Build EXE
        shell: pwsh
        run: |
          $env:CGO_ENABLED="0"
          $env:GOARCH="amd64"          
          
          go build -ldflags="-s -w -H=windowsgui" -o mihomo-run.exe .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-run
          path: mihomo-run.exe
