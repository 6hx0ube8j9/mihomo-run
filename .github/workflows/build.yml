name: Build Mihomo Run

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Build
        run: |
          # 1. 安装并准确定位 rsrc
          go install github.com/akavel/rsrc@latest
          $env:GOPATH = (go env GOPATH)
          $RSRC_EXE = Join-Path $env:GOPATH "bin" "rsrc.exe"

          # 2. 依赖初始化
          if (Test-Path "go.mod") { rm go.mod }
          go mod init mihomo-run
          go get golang.org/x/sys/windows
          go mod tidy
          
          # 3. 创建权限清单 (必须包含 assemblyIdentity 以确保合规)
          $manifest = @"
          <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <assembly xmlns="urn:schemas-microsoft-com:asm.v1" manifestVersion="1.0">
            <assemblyIdentity version="1.0.0.0" processorArchitecture="*" name="mihomo-run" type="win32"/>
            <trustInfo xmlns="urn:schemas-microsoft-com:asm.v3">
              <security>
                <requestedPrivileges>
                  <requestedExecutionLevel level="requireAdministrator" uiAccess="false"/>
                </requestedPrivileges>
              </security>
            </trustInfo>
          </assembly>
          "@
          $manifest | Out-File -FilePath "app.manifest" -Encoding utf8

          # 4. 关键步骤：使用 & 调用绝对路径，确保 rsrc.syso 生成在当前目录
          & $RSRC_EXE -manifest app.manifest -o rsrc.syso

          # 5. 编译：Go 会自动检测并嵌入同目录下的 rsrc.syso
          $env:GOOS="windows"
          $env:GOARCH="amd64"
          go build -ldflags="-H windowsgui -s -w" -o mihomo-run.exe main.go

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-run-binary
          path: mihomo-run.exe
          retention-days: 7
