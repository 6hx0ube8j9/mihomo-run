name: Build mihomo-run

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install dependencies
        shell: pwsh
        run: go mod tidy

      - name: Install and Run rsrc
        shell: pwsh
        run: |
          go install github.com/akavel/rsrc@latest
          
          $gobin = (go env GOPATH) + "\bin"
          $rsrcPath = Join-Path $gobin "rsrc.exe"
          $icoPath = "ui/icons/app.ico"
          
          if (Test-Path $icoPath) {
            & $rsrcPath -manifest main.manifest -ico $icoPath -o rsrc.syso
          } else {
            Write-Error "Icon file not found at $icoPath"
            exit 1
          }

      - name: Build EXE
        shell: pwsh
        run: |
          $env:CGO_ENABLED = "1"
          $env:GOARCH = "amd64"
          
          go build -ldflags="-s -w -H=windowsgui" -o mihomo-run.exe .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-run-win-amd64
          path: mihomo-run.exe
