name: Build Mihomo Run

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Install rsrc
        run: go install github.com/akavel/rsrc@latest

      - name: Build with Manifest Injection
        run: |
          if (Test-Path "go.mod") { rm go.mod }
          go mod init mihomo-run
          go get golang.org/x/sys/windows
          go mod tidy
          
          # 创建 Manifest 文件
          $manifest = @"
          <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <assembly xmlns="urn:schemas-microsoft-com:asm.v1" manifestVersion="1.0">
            <trustInfo xmlns="urn:schemas-microsoft-com:asm.v3">
              <security>
                <requestedPrivileges>
                  <requestedExecutionLevel level="requireAdministrator" uiAccess="false"/>
                </requestedPrivileges>
              </security>
            </trustInfo>
          </assembly>
          "@
          $manifest | Out-File -FilePath "mihomo.manifest" -Encoding utf8

          # 使用 rsrc 生成 .syso 对象文件
          # Go 编译器会自动检测目录下的 .syso 并将其链接进二进制资源
          rsrc -manifest mihomo.manifest -o rsrc.syso

          # 编译：-H windowsgui 彻底消除黑框，-s -w 压缩体积
          $env:GOOS="windows"
          $env:GOARCH="amd64"
          go build -ldflags="-H windowsgui -s -w" -o mihomo-run.exe main.go

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-run-binary
          path: mihomo-run.exe
          retention-days: 7
